embedding_model:
  provider: "huggingface"
  model_name: "sentence-transformers/all-MiniLM-L6-v2"

retriever:
  top_k: 10
  search_type: "mmr"  # Options: "similarity", "mmr", "similarity_score_threshold"
  # MMR (Maximal Marginal Relevance) parameters for diverse results
  fetch_k: 20  # Number of documents to fetch before MMR re-ranking (should be > top_k)
  lambda_mult: 0.5  # Diversity vs relevance (0=max diversity, 1=max relevance)

llm:
  # Set LLM_PROVIDER env var to "groq" or "vllm" to switch providers
  # Default: groq (for local development)
  
  groq:
    provider: "groq"
    model_name: "llama-3.3-70b-versatile"  # Groq model
    temperature: 0
    max_output_tokens: 2048

  vllm:
    provider: "vllm"
    model_name: "openai/gpt-oss-20b"  # Your vLLM model on RunPod
    base_url: "http://localhost:8000/v1"  # Override with VLLM_BASE_URL env var
    temperature: 0
    max_output_tokens: 2048
